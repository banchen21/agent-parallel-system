<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent Parallel System Console</title>
  <style>
    :root {
      --bg1: #f3f5ef;
      --bg2: #f8eee1;
      --card: #ffffffde;
      --line: #d8dfd4;
      --ink: #19241d;
      --muted: #5a6a60;
      --brand: #0f766e;
      --brand-2: #14532d;
      --warn: #b45309;
      --ok: #166534;
      --err: #b91c1c;
      --mono: "IBM Plex Mono", Menlo, Consolas, monospace;
      --sans: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: var(--sans);
      background:
        radial-gradient(circle at 10% 0%, #d4ece2 0%, transparent 35%),
        radial-gradient(circle at 100% 0%, #ffe1ba 0%, transparent 30%),
        linear-gradient(120deg, var(--bg1), var(--bg2));
      min-height: 100vh;
      padding: 16px;
    }

    .layout {
      max-width: 1280px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 14px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 10px 26px rgba(16, 24, 20, 0.08);
      overflow: hidden;
    }

    .sidebar-head, .main-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, #f6fbf9, #fffbf4);
    }
    .sidebar-head h1, .main-head h2 {
      margin: 0;
      font-size: 17px;
      letter-spacing: .2px;
    }
    .sub {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .endpoint-list {
      max-height: calc(100vh - 210px);
      overflow: auto;
      padding: 8px;
    }
    .group {
      margin-bottom: 10px;
      border: 1px dashed var(--line);
      border-radius: 10px;
      padding: 8px;
      background: #ffffffb8;
    }
    .group h3 {
      margin: 0 0 8px;
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .ep {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 8px;
      background: #fff;
      padding: 8px;
      margin-bottom: 6px;
      text-align: left;
      cursor: pointer;
      transition: .15s ease;
    }
    .ep:hover { border-color: #b8d1c8; transform: translateY(-1px); }
    .ep.active { border-color: var(--brand); background: #edf8f4; }
    .ep .top {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }

    .tag {
      display: inline-block;
      font: 700 11px var(--mono);
      padding: 2px 6px;
      border-radius: 999px;
      color: white;
      background: var(--brand);
    }
    .tag.warn { background: var(--warn); }
    .tag.get { background: #0e7490; }
    .tag.post { background: #0f766e; }
    .tag.put { background: #6d28d9; }
    .tag.delete { background: #be123c; }

    .path {
      font: 12px var(--mono);
      color: var(--ink);
      word-break: break-all;
    }
    .desc {
      font-size: 12px;
      color: var(--muted);
    }

    .content {
      display: grid;
      grid-template-rows: auto auto 1fr;
      min-height: calc(100vh - 32px);
    }

    .quick {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
    }
    .metric {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fff;
    }
    .metric .k { font-size: 12px; color: var(--muted); }
    .metric .v { margin-top: 5px; font: 700 16px var(--mono); }

    .editor {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #fffefb;
    }
    .field { display: grid; gap: 6px; }
    label {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid #c7d2cc;
      border-radius: 9px;
      padding: 10px;
      font: 13px var(--mono);
      background: #fff;
      color: var(--ink);
    }
    textarea { min-height: 180px; resize: vertical; }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    button {
      border: 0;
      border-radius: 9px;
      padding: 9px 12px;
      color: white;
      background: var(--brand);
      font: 600 13px var(--sans);
      cursor: pointer;
    }
    button.alt { background: var(--brand-2); }
    button.ghost {
      background: #e6efeb;
      color: #1f3128;
    }

    .result {
      padding: 12px 14px;
      display: grid;
      gap: 12px;
      background: #fff;
    }
    .block {
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
    }
    .block h4 {
      margin: 0;
      padding: 8px 10px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      background: #f7faf8;
      border-bottom: 1px solid var(--line);
    }
    pre {
      margin: 0;
      padding: 10px;
      white-space: pre-wrap;
      word-break: break-word;
      font: 12px/1.45 var(--mono);
      background: #fff;
      color: #0f172a;
      max-height: 230px;
      overflow: auto;
    }
    .ok { color: var(--ok); }
    .err { color: var(--err); }

    @media (max-width: 1040px) {
      .layout { grid-template-columns: 1fr; }
      .endpoint-list { max-height: 260px; }
      .editor { grid-template-columns: 1fr; }
      .content { min-height: auto; }
      .quick { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="panel">
      <div class="sidebar-head">
        <h1>API 控制台</h1>
        <div class="sub" id="meta">加载中...</div>
      </div>
      <div class="endpoint-list" id="endpoint-list"></div>
    </aside>

    <section class="panel content">
      <div class="main-head">
        <h2 id="title">选择一个接口</h2>
        <div class="sub" id="subtitle">点击左侧任意端点后可直接发起请求。</div>
      </div>

      <div class="quick">
        <div class="metric"><div class="k">Server Health</div><div class="v" id="health-metric">...</div></div>
        <div class="metric"><div class="k">Total Endpoints</div><div class="v" id="total-metric">0</div></div>
        <div class="metric"><div class="k">Implemented</div><div class="v" id="impl-metric">0</div></div>
      </div>

      <div>
        <div class="editor">
          <div class="field">
            <label for="method">Method</label>
            <select id="method">
              <option>GET</option><option>POST</option><option>PUT</option><option>DELETE</option>
            </select>
          </div>
          <div class="field">
            <label for="path">Path</label>
            <input id="path" value="/health">
          </div>
          <div class="field">
            <label for="token">Bearer Token (可选)</label>
            <input id="token" placeholder="eyJhbGciOi...">
          </div>
          <div class="field">
            <label for="base">Base URL</label>
            <input id="base">
          </div>
          <div class="field" style="grid-column: 1 / -1;">
            <label for="body">Request Body (JSON)</label>
            <textarea id="body">{}</textarea>
          </div>
          <div class="actions" style="grid-column: 1 / -1;">
            <button id="send">发送请求</button>
            <button class="alt" id="use-example">使用示例请求</button>
            <button class="ghost" id="copy-curl">复制 cURL</button>
            <button class="ghost" id="check-health">检查健康</button>
          </div>
        </div>

        <div class="result">
          <div class="block">
            <h4>Endpoint Docs</h4>
            <pre id="docs-output">尚未选择端点。</pre>
          </div>
          <div class="block">
            <h4>HTTP Result</h4>
            <pre id="http-output">等待请求...</pre>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const ui = {
      list: $("endpoint-list"),
      meta: $("meta"),
      title: $("title"),
      subtitle: $("subtitle"),
      total: $("total-metric"),
      impl: $("impl-metric"),
      health: $("health-metric"),
      method: $("method"),
      path: $("path"),
      token: $("token"),
      base: $("base"),
      body: $("body"),
      docs: $("docs-output"),
      http: $("http-output"),
      send: $("send"),
      useExample: $("use-example"),
      copyCurl: $("copy-curl"),
      checkHealth: $("check-health"),
    };

    let spec = null;
    let current = null;

    function methodClass(method) {
      return method.toLowerCase();
    }

    function renderSidebar() {
      const groups = {};
      for (const ep of spec.endpoints) {
        groups[ep.group] = groups[ep.group] || [];
        groups[ep.group].push(ep);
      }
      ui.list.innerHTML = "";
      for (const [group, items] of Object.entries(groups)) {
        const wrap = document.createElement("div");
        wrap.className = "group";
        wrap.innerHTML = `<h3>${group}</h3>`;
        for (const ep of items) {
          const btn = document.createElement("button");
          btn.className = "ep";
          btn.dataset.key = `${ep.method} ${ep.path}`;
          btn.innerHTML = `
            <div class="top">
              <span class="tag ${methodClass(ep.method)}">${ep.method}</span>
              <span class="tag ${ep.implemented ? "" : "warn"}">${ep.implemented ? "implemented" : "placeholder"}</span>
            </div>
            <div class="path">${ep.path}</div>
            <div class="desc">${ep.description}</div>
          `;
          btn.onclick = () => selectEndpoint(ep, btn);
          wrap.appendChild(btn);
        }
        ui.list.appendChild(wrap);
      }
    }

    function selectEndpoint(ep, btn) {
      current = ep;
      document.querySelectorAll(".ep").forEach(e => e.classList.remove("active"));
      btn.classList.add("active");
      ui.title.textContent = `${ep.method} ${ep.path}`;
      ui.subtitle.textContent = `${ep.group} | ${ep.description}`;
      ui.method.value = ep.method;
      ui.path.value = ep.path;
      ui.body.value = ep.request_example ? JSON.stringify(ep.request_example, null, 2) : "{}";
      renderDocs(ep);
    }

    function renderDocs(ep) {
      const curl = buildCurl(ep.method, ep.path, ep.request_example || {});
      const text =
`描述: ${ep.description}
分组: ${ep.group}
认证: ${ep.auth ? "Bearer Token" : "无"}
实现状态: ${ep.implemented ? "已实现" : "占位处理器"}
备注: ${ep.notes}

请求示例:
${ep.request_example ? JSON.stringify(ep.request_example, null, 2) : "(无 body)"}

响应示例:
${JSON.stringify(ep.response_example, null, 2)}

cURL:
${curl}`;
      ui.docs.textContent = text;
    }

    function buildCurl(method, path, bodyObj) {
      const base = ui.base.value.replace(/\/+$/, "");
      const token = ui.token.value.trim();
      let cmd = `curl -X ${method} "${base}${path}"`;
      if (token) cmd += ` -H "Authorization: Bearer ${token}"`;
      if (method !== "GET" && method !== "DELETE") {
        cmd += ` -H "Content-Type: application/json" -d '${JSON.stringify(bodyObj)}'`;
      }
      return cmd;
    }

    async function sendRequest() {
      ui.http.textContent = "请求中...";
      const method = ui.method.value;
      const path = ui.path.value.trim();
      const base = ui.base.value.replace(/\/+$/, "");
      const token = ui.token.value.trim();
      const headers = {};
      let body = null;

      if (token) headers["Authorization"] = `Bearer ${token}`;
      if (method !== "GET" && method !== "DELETE") {
        headers["Content-Type"] = "application/json";
        try {
          body = ui.body.value.trim() ? JSON.stringify(JSON.parse(ui.body.value)) : "{}";
        } catch (e) {
          ui.http.textContent = "Body JSON 解析失败: " + e;
          ui.http.className = "err";
          return;
        }
      }

      try {
        const res = await fetch(`${base}${path}`, { method, headers, body });
        const txt = await res.text();
        const rendered = `HTTP ${res.status} ${res.statusText}\n\nHeaders:\n${[...res.headers.entries()].map(([k,v]) => `${k}: ${v}`).join("\n")}\n\nBody:\n${txt}`;
        ui.http.textContent = rendered;
        ui.http.className = res.ok ? "ok" : "err";

        // 自动保存登录/注册/刷新返回的 tokens
        if (res.ok && (path.includes('/auth/login') || path.includes('/auth/register') || path.includes('/auth/refresh'))) {
          try {
            const data = JSON.parse(txt);
            if (data.data) {
              if (data.data.access_token) {
                saveTokens(data.data.access_token, data.data.refresh_token);
                ui.http.textContent = rendered + "\n\n✓ Tokens 已自动保存并启用自动刷新";
              }
            }
          } catch (e) {
            // 忽略 JSON 解析错误
          }
        }
      } catch (e) {
        ui.http.textContent = "请求失败: " + e;
        ui.http.className = "err";
      }
    }

    async function checkHealth() {
      try {
        const res = await fetch(ui.base.value.replace(/\/+$/, "") + "/health");
        ui.health.textContent = `HTTP ${res.status}`;
        ui.health.className = "v " + (res.ok ? "ok" : "err");
      } catch (_e) {
        ui.health.textContent = "DOWN";
        ui.health.className = "v err";
      }
    }

    async function loadSpec() {
      const r = await fetch("/ui/spec");
      spec = await r.json();
      ui.meta.textContent = `${spec.name} v${spec.version} | Base ${spec.base_url} | Generated ${spec.generated_at}`;
      ui.total.textContent = String(spec.endpoints.length);
      ui.impl.textContent = String(spec.endpoints.filter(e => e.implemented).length);
      renderSidebar();
      checkHealth();
    }

    // Token 自动刷新相关
    let refreshTimer = null;

    function parseJwt(token) {
      try {
        const base64Url = token.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const jsonPayload = decodeURIComponent(atob(base64).split('').map(c =>
          '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
        ).join(''));
        return JSON.parse(jsonPayload);
      } catch (e) {
        console.error('解析 JWT 失败:', e);
        return null;
      }
    }

    function getTokenExpiry(token) {
      const payload = parseJwt(token);
      if (payload && payload.exp) {
        return payload.exp * 1000; // 转换为毫秒
      }
      return null;
    }

    async function refreshAccessToken() {
      const refreshToken = localStorage.getItem("aps_refresh_token");
      if (!refreshToken) {
        console.log('没有 refresh token，无法自动刷新');
        return false;
      }

      try {
        const response = await fetch(`${ui.base.value}/api/v1/auth/refresh`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ refresh_token: refreshToken })
        });

        if (!response.ok) {
          throw new Error(`刷新失败: ${response.status}`);
        }

        const result = await response.json();
        if (result.data && result.data.access_token) {
          // 更新 tokens
          ui.token.value = result.data.access_token;
          localStorage.setItem("aps_token", result.data.access_token);
          
          if (result.data.refresh_token) {
            localStorage.setItem("aps_refresh_token", result.data.refresh_token);
          }

          console.log('Token 自动刷新成功');
          scheduleTokenRefresh(result.data.access_token);
          return true;
        }
        return false;
      } catch (e) {
        console.error('自动刷新 token 失败:', e);
        ui.http.textContent = `Token 自动刷新失败: ${e.message}\n请重新登录`;
        ui.http.className = "warn";
        return false;
      }
    }

    function scheduleTokenRefresh(token) {
      // 清除之前的定时器
      if (refreshTimer) {
        clearTimeout(refreshTimer);
        refreshTimer = null;
      }

      const expiry = getTokenExpiry(token);
      if (!expiry) {
        console.log('无法获取 token 过期时间');
        return;
      }

      const now = Date.now();
      const timeUntilExpiry = expiry - now;
      
      // 在过期前 5 分钟刷新（或剩余时间的 80%，取较小值）
      const refreshBefore = Math.min(5 * 60 * 1000, timeUntilExpiry * 0.2);
      const refreshIn = timeUntilExpiry - refreshBefore;

      if (refreshIn > 0) {
        console.log(`Token 将在 ${Math.round(refreshIn / 1000 / 60)} 分钟后自动刷新`);
        refreshTimer = setTimeout(async () => {
          console.log('开始自动刷新 token...');
          await refreshAccessToken();
        }, refreshIn);
      } else {
        console.log('Token 即将过期，立即刷新');
        refreshAccessToken();
      }
    }

    function saveTokens(accessToken, refreshToken) {
      if (accessToken) {
        ui.token.value = accessToken;
        localStorage.setItem("aps_token", accessToken);
        scheduleTokenRefresh(accessToken);
      }
      if (refreshToken) {
        localStorage.setItem("aps_refresh_token", refreshToken);
      }
    }

    function init() {
      ui.base.value = `${location.protocol}//${location.host}`;
      ui.token.value = localStorage.getItem("aps_token") || "";

      // 启动时检查并设置自动刷新
      if (ui.token.value) {
        scheduleTokenRefresh(ui.token.value);
      }

      ui.token.addEventListener("input", () => {
        const token = ui.token.value;
        localStorage.setItem("aps_token", token);
        if (token) {
          scheduleTokenRefresh(token);
        }
      });

      ui.send.onclick = sendRequest;
      ui.checkHealth.onclick = checkHealth;
      ui.useExample.onclick = () => {
        if (!current) return;
        ui.body.value = current.request_example ? JSON.stringify(current.request_example, null, 2) : "{}";
      };
      ui.copyCurl.onclick = async () => {
        if (!current) return;
        const sample = current.request_example || {};
        const curl = buildCurl(current.method, current.path, sample);
        try {
          await navigator.clipboard.writeText(curl);
          ui.http.textContent = "已复制 cURL 到剪贴板:\n" + curl;
          ui.http.className = "ok";
        } catch (e) {
          ui.http.textContent = "复制失败: " + e + "\n\n" + curl;
          ui.http.className = "err";
        }
      };
    }

    init();
    loadSpec().catch((e) => {
      ui.meta.textContent = "加载 /ui/spec 失败";
      ui.http.textContent = String(e);
      ui.http.className = "err";
    });
  </script>
</body>
</html>
