services:
  # PostgreSQL数据库
  postgres:
    image: postgres:15-alpine
    container_name: agent-system-postgres
    environment:
      POSTGRES_DB: agent_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent-network

  # Redis缓存和消息队列
  redis:
    image: redis:7-alpine
    container_name: agent-system-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent-network

  # 主应用服务
  api:
    build: .
    container_name: agent-system-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # 应用配置
      APP_ENV: development
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      
      # 数据库配置
      DATABASE_URL: postgres://postgres:password@postgres:5432/agent_system
      DATABASE_POOL_MAX_CONNECTIONS: 20
      DATABASE_POOL_MIN_CONNECTIONS: 5
      
      # Redis配置
      REDIS_URL: redis://redis:6379
      REDIS_POOL_SIZE: 10
      
      # JWT配置
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 30
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: 7
      
      # 安全配置
      BCRYPT_COST: 12
      API_RATE_LIMIT: 100
      API_RATE_LIMIT_WINDOW: 60
      
      # 服务器配置
      HOST: 0.0.0.0
      PORT: 8000
      WORKERS: 4
      API_PREFIX: /api/v1
      
      # 日志配置
      LOG_LEVEL: info
      LOG_FORMAT: json
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
      - ./config:/app/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - agent-network
    restart: unless-stopped

  # 后台工作器服务
  worker:
    build: .
    container_name: agent-system-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # 复用API服务的环境变量
      APP_ENV: development
      DATABASE_URL: postgres://postgres:password@postgres:5432/agent_system
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: info
      LOG_FORMAT: json
    command: >
      sh -c "
        echo '等待数据库就绪...' &&
        sleep 10 &&
        echo '运行数据库迁移...' &&
        ./agent-parallel-system migrate &&
        echo '启动后台工作器...' &&
        ./agent-parallel-system worker
      "
    volumes:
      - ./config:/app/config
    networks:
      - agent-network
    restart: unless-stopped

  # 监控服务（可选）
  prometheus:
    image: prom/prometheus:latest
    container_name: agent-system-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - agent-network
    restart: unless-stopped

  # Grafana仪表板（可选）
  grafana:
    image: grafana/grafana:latest
    container_name: agent-system-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3000:3000"
    networks:
      - agent-network
    restart: unless-stopped

  # 反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: agent-system-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    networks:
      - agent-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  agent-network:
    driver: bridge