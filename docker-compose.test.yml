services:
  # PostgreSQL数据库
  postgres:
    image: postgres:15-alpine
    container_name: agent-system-postgres-test
    environment:
      POSTGRES_DB: agent_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data_test:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"  # 使用不同端口避免冲突
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent-network-test

  # Redis缓存和消息队列
  redis:
    image: redis:7-alpine
    container_name: agent-system-redis-test
    command: redis-server --appendonly yes
    volumes:
      - redis_data_test:/data
    ports:
      - "6380:6379"  # 使用不同端口避免冲突
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent-network-test

  # 主应用服务
  api:
    build: .
    container_name: agent-system-api-test
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # 应用配置
      APP_ENV: development
      APP_DEBUG: "true"
      APP_URL: http://localhost:8001
      
      # 数据库配置
      DATABASE_URL: postgres://postgres:password@postgres:5432/agent_system
      DATABASE_POOL_MAX_CONNECTIONS: 20
      DATABASE_POOL_MIN_CONNECTIONS: 5
      
      # Redis配置
      REDIS_URL: redis://redis:6379
      REDIS_POOL_SIZE: 10
      
      # JWT配置
      JWT_SECRET: test-jwt-secret-key-for-development
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 30
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: 7
      
      # 安全配置
      BCRYPT_COST: 12
      API_RATE_LIMIT: 100
      API_RATE_LIMIT_WINDOW: 60
      
      # 服务器配置
      HOST: 0.0.0.0
      PORT: 8000
      WORKERS: 2
      API_PREFIX: /api/v1
      
      # 日志配置
      LOG_LEVEL: info
      LOG_FORMAT: json
    ports:
      - "8001:8000"  # 使用不同端口避免冲突
    volumes:
      - ./storage:/app/storage
      - ./config:/app/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - agent-network-test
    restart: unless-stopped

volumes:
  postgres_data_test:
    driver: local
  redis_data_test:
    driver: local

networks:
  agent-network-test:
    driver: bridge